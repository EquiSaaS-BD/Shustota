<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_15 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_15" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_15');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Simple DNA Helix structure
const group = new THREE.Group();
const sphereGeom = new THREE.SphereGeometry(0.1, 16, 16);
const material = new THREE.MeshPhongMaterial({ color: 0x0052cc, shininess: 100 });
const materialAccent = new THREE.MeshPhongMaterial({ color: 0xcadaff, shininess: 50 });

for (let i = 0; i < 40; i++) {
    const y = (i - 20) * 0.25;
    const angle = i * 0.4;
    
    const sphere1 = new THREE.Mesh(sphereGeom, material);
    sphere1.position.set(Math.cos(angle), y, Math.sin(angle));
    group.add(sphere1);
    
    const sphere2 = new THREE.Mesh(sphereGeom, materialAccent);
    sphere2.position.set(Math.cos(angle + Math.PI), y, Math.sin(angle + Math.PI));
    group.add(sphere2);
    
    const lineGeom = new THREE.CylinderGeometry(0.02, 0.02, 2, 8);
    const line = new THREE.Mesh(lineGeom, new THREE.MeshPhongMaterial({ color: 0x999999, opacity: 0.5, transparent: true }));
    line.rotation.z = Math.PI / 2;
    line.position.y = y;
    line.scale.x = 1;
    group.add(line);
}

scene.add(group);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(1, 1, 2);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.01;
    group.rotation.x += 0.005;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_15 -->
</body>
</html>
