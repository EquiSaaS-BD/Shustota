<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_19" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_19');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-SIGNUP_3D');
  if (!container) return;
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

  renderer.setSize(width, height);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Floating Medical Crosses / Particles
  const group = new THREE.Group();
  const geometry = new THREE.BoxGeometry(0.2, 0.6, 0.2);
  const geometry2 = new THREE.BoxGeometry(0.6, 0.2, 0.2);
  const material = new THREE.MeshPhongMaterial({ 
    color: 0x0052cc, 
    transparent: true, 
    opacity: 0.6,
    shininess: 100 
  });

  for (let i = 0; i < 20; i++) {
    const cross = new THREE.Group();
    const part1 = new THREE.Mesh(geometry, material);
    const part2 = new THREE.Mesh(geometry2, material);
    cross.add(part1);
    cross.add(part2);
    
    cross.position.set(
      (Math.random() - 0.5) * 10,
      (Math.random() - 0.5) * 10,
      (Math.random() - 0.5) * 5
    );
    cross.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
    group.add(cross);
  }

  scene.add(group);

  const light = new THREE.PointLight(0xffffff, 1, 100);
  light.position.set(5, 5, 5);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));

  camera.position.z = 5;

  function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.002;
    group.children.forEach(c => {
      c.rotation.x += 0.01;
      c.rotation.y += 0.01;
    });
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  animate();
})();
})();
</script>

<script>
        function switchTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const signupBtn = document.getElementById('tab-signup');
            const indicator = document.getElementById('tab-indicator');
            const loginForm = document.getElementById('form-login');
            const signupForm = document.getElementById('form-signup');

            if (tab === 'login') {
                loginBtn.classList.add('active');
                signupBtn.classList.remove('active');
                indicator.style.transform = 'translateX(0)';
                
                loginForm.style.transform = 'translateX(0)';
                signupForm.style.transform = 'translateX(100%)';
            } else {
                signupBtn.classList.add('active');
                loginBtn.classList.remove('active');
                indicator.style.transform = 'translateX(100%)';
                
                loginForm.style.transform = 'translateX(-100%)';
                signupForm.style.transform = 'translateX(0)';
            }
        }
    </script>
